spring:
  datasource:
    url: jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require
    username: postgres.ivdtjwkrhtmvhueaemru
    password: NQApqTqbPycGKcz8
    driver-class-name: org.postgresql.Driver

    # ✅ HikariCP settings for Supabase/PgBouncer compatibility
    hikari:
      # Disable PgJDBC prepared‑statement caching (required for PgBouncer)
      data-source-properties:
        prepareThreshold: 0
        preparedStatementCacheQueries: 0

      # ✅ Prevent stale connections (Supabase idle timeout ~10 min)
      maxLifetime: 180000              # 3 minutes (milliseconds)
      connectionTimeout: 30000         # 30 seconds
      validationTimeout: 5000          # 5 seconds
      connection-test-query: SELECT 1  # Validate before use
      minimumIdle: 2
      maximumPoolSize: 10

  jpa:
    hibernate:
      ddl-auto: update   # safe for dev; remove in production
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # ✅ Release connections after each transaction to avoid holding them
        connection.release_mode: after_transaction

  # ✅ CORS configuration for frontend access
  web:
    cors:
      allowed-origins: http://localhost:5173
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: '*'
      allow-credentials: true

